<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raft Leader Election Visualizer</title>
    <script>
      (function(){
        var p = localStorage.getItem('theme-preference') || 'system';
        var dark = p === 'dark' || (p === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        if (!dark) document.documentElement.classList.add('light');
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function() {
        var p = sessionStorage.getItem('spa-redirect');
        if (p) {
          sessionStorage.removeItem('spa-redirect');
          history.replaceState(null, '', p);
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
